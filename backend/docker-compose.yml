services:
  api:
    build:
      context: .
      target: production
    container_name: lumio-api
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - DEBUG=true
      - LOG_LEVEL=DEBUG
      - ALLOWED_ORIGINS=http://localhost:5500,http://127.0.0.1:5500,http://localhost:3000
      - RATE_LIMIT_FETCH=100/minute
      - RATE_LIMIT_DOWNLOAD=30/minute
      - TMP_DIR=/tmp/lumio_downloads
    volumes:
      - .:/app                          # live reload source
      - lumio_tmp:/tmp/lumio_downloads  # persist temp files across restarts
    command: >
      uvicorn main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --log-level debug
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 8s
      retries: 3

volumes:
  lumio_tmp:
